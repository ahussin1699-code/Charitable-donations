<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شاشة البداية - منصة تبرعات خيرية</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        font-family:
          "Tajawal",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        background: #0a4f2f;
      }

      .splash {
        position: relative;
        width: 100%;
        height: 100vh;
        background-image: url("pngtree-helping-hand-symbol-aid-teenager-assistance-photo-picture-image_11439234.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(15, 92, 51, 0.82);
      }

      .splash-content {
        position: relative;
        text-align: center;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 0 20px;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
      }

      .splash-content.show {
        opacity: 1;
        transform: translateY(0);
      }

      .splash-icon i {
        font-size: clamp(52px, 7vw, 72px);
      }

      .splash-title {
        font-size: clamp(20px, 3vw, 28px);
        font-weight: 700;
      }

      .splash-subtitle {
        font-size: clamp(16px, 2.5vw, 22px);
        font-weight: 400;
      }

      @media (max-width: 600px) {
        .splash {
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="splash-content">
        <div class="splash-icon">
          <i class="fa-solid fa-hand-holding-heart"></i>
        </div>
        <h1 class="splash-title">منصة تبرعات خيرية</h1>
        <p class="splash-subtitle">ساهم في رسم إبتسامة بتبرع بسيط منك</p>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
