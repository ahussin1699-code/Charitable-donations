<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل حساب جديد</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/Register .css" />
    <style></style>
  </head>

  <body>
    <!-- ===== الشريط الأخضر الأعلى ===== -->
    <div class="header-bar">منصة تبرعات خيرية</div>

    <div class="form-container">
      <h2>تسجيل حساب جديد</h2>

      <!-- اختيار نوع الحساب -->
      <div class="user-type-boxes">
        <div class="user-type-box" data-type="beneficiary">مستفيد</div>
        <div class="user-type-box" data-type="donor">متبرع</div>
      </div>

      <form id="registrationForm">
        <input type="text" id="firstName" placeholder="الاسم الأول" required />
        <input type="text" id="lastName" placeholder="الاسم الأخير" required />
        <input
          type="text"
          id="contact"
          placeholder="البريد الإلكتروني أو رقم الهاتف"
          required
        />
        <input
          type="text"
          id="address"
          placeholder="العنوان"
          style="display: none"
        />
        <input
          type="password"
          id="password"
          placeholder="كلمة المرور"
          required
        />
        <input
          type="password"
          id="confirmPassword"
          placeholder="تأكيد كلمة المرور"
          required
        />
        <input type="date" id="birthDate" required />

        <div class="gender-boxes" id="genderBoxes" style="display: none">
          <div class="gender-box" data-gender="male">ذكر</div>
          <div class="gender-box" data-gender="female">أنثى</div>
        </div>

        <button type="button" onclick="register()">تسجيل</button>
      </form>

      <div class="login-link">
        لديك حساب بالفعل؟ <a href="Login.html">تسجيل الدخول</a>
      </div>
    </div>

    <script src="../Js/config.js"></script>
    <script src="../Js/Register .js"></script>
  </body>
</html>
