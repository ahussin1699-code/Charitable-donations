<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا - منصة تبرعات خيرية</title>
    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="../css/اتصال بنا.css" />
    <style></style>
  </head>
  <body>
    <!-- الهيدر العلوي -->
    <header>
      <div class="header-container">
        <div class="logo">تبرعات خيرية</div>

        <nav class="main-nav">
          <a href="الصفحه الرئسيه.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
          </a>
          <a href="اتصال بنا.html" class="nav-item active">
            <i class="fa-solid fa-envelope" style="color: #f4d03f"></i>
            <span>تواصل معنا</span>
          </a>
          <a href="من نحن.html" class="nav-item">
            <i class="fa-solid fa-circle-info"></i>
            <span>من نحن</span>
          </a>
          <a href="تسجيل الدخول .html" class="nav-item" id="authBtn">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span>تسجيل الدخول</span>
          </a>
        </nav>
      </div>
    </header>

    <!-- محتوى الصفحة -->
    <div class="content-wrapper">
      <h1 class="page-title">تواصل معنا</h1>
      <p class="page-subtitle">
        يسعدنا تواصلك معنا لأي استفسارات أو إقتراحات وسنقوم بالرد في اقرب وقت
        ممكن
      </p>

      <div class="contact-container">
        <!-- معلومات التواصل -->
        <div class="contact-info">
          <div class="info-item">
            <i class="fa-solid fa-phone"></i>
            <span>01020152710</span>
          </div>

          <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://wa.me/201020152710" target="_blank"
              ><i class="fa-brands fa-whatsapp"></i
            ></a>
          </div>
        </div>

        <!-- نموذج الاتصال -->
        <div class="form-box">
          <form id="contactForm">
            <div class="form-group">
              <label for="name">الاسم</label>
              <input type="text" id="name" name="name" required />
            </div>

            <div class="form-group">
              <label for="email">البريد الالكتروني</label>
              <input type="email" id="email" name="email" required />
            </div>

            <div class="form-group">
              <label for="message">الرسالة</label>
              <textarea
                id="message"
                name="message"
                rows="6"
                required
              ></textarea>
            </div>

            <button type="submit" class="send-btn">إرسال</button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Js/config.js"></script>
    <script src="../Js/اتصال بنا.js"></script>
  
    <link rel="stylesheet" href="../css/chatbot.css">
    <script src="../Js/chatbot.js"></script>
</body>
</html>
