<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إضافة حالة إنسانية جديدة</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/اضافه حاله جديده.css" />
    <style></style>
  </head>
  <body>
    <!-- الشريط الجانبي -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>
          <i class="fas fa-hands-holding-child"></i>
          <span>تبرعات خيريه</span>
        </h2>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li>
            <a href="الصفحه الرئسيه.html"
              ><i class="fas fa-home"></i> <span>الصفحة الرئيسية</span></a
            >
          </li>
          <li>
            <a href="لوحه التحكم .html"
              ><i class="fas fa-tachometer-alt"></i> <span>لوحة التحكم</span></a
            >
          </li>
          <li>
            <a href="ادارة المستخدمين.html"
              ><i class="fas fa-users"></i> <span>إدارة المستخدمين</span></a
            >
          </li>
          <li>
            <a href="مراجعه الحالات.html"
              ><i class="fas fa-hands-helping"></i> <span>المستفيدون</span></a
            >
          </li>
          <li>
            <a href="مراجعه التبرعات.html"
              ><i class="fas fa-hand-holding-usd"></i>
              <span>مراجعة التبرعات</span></a
            >
          </li>
          <li>
            <a href="الاشعارات.html"
              ><i class="fas fa-bell"></i> <span>الاشعارات</span></a
            >
          </li>
          <li>
            <a href="اضافة حاله جديده.html" class="active"
              ><i class="fas fa-plus-circle"></i> <span>إضافة حالة</span></a
            >
          </li>
          <li>
            <a href="التقارير الطبيه.html"
              ><i class="fas fa-file-medical"></i>
              <span>التقارير الطبية</span></a
            >
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn-sidebar" id="sidebarLogoutBtn">
          <i class="fas fa-sign-out-alt"></i>
          <span>تسجيل الخروج</span>
        </button>
      </div>
    </div>

    <div class="main-content">
      <header class="top-header">
        <div class="header-title">
          <h1>إضافة حالة إنسانية</h1>
        </div>
        <div class="admin-profile-box">
          <span id="adminHeaderName">جاري التحميل...</span>
          <img
            id="adminHeaderImg"
            src="../images/default-avatar.png"
            alt="صورة المسؤول"
          />
        </div>
      </header>

      <div class="form-container">
        <h2 class="form-title">بيانات الحالة المحتاجة</h2>
        <div class="border-accent"></div>

        <form id="caseForm">
          <div class="form-group">
            <input
              type="text"
              id="caseName"
              placeholder="اسم الحالة أو صاحب الحالة"
              required
            />
          </div>

          <div class="form-group">
            <input
              type="text"
              id="caseDescription"
              placeholder="وصف مفصل للحالة واحتياجاتها"
              required
            />
          </div>

          <div class="form-group">
            <div class="case-type-menu">
              <button type="button" class="case-type-toggle">
                <span class="case-type-label">اختر تصنيف الحالة</span>
                <i class="fa-solid fa-chevron-down"></i>
              </button>
              <div class="case-type-list">
                <button type="button" data-type="علاج">علاج</button>
                <button type="button" data-type="اجهزه طبيه">أجهزة طبية</button>
                <button type="button" data-type="عمليات جراحيه">
                  عمليات جراحية
                </button>
                <button type="button" data-type="مساعدة عامة">
                  مساعدة عامة
                </button>
              </div>
            </div>
            <input type="hidden" id="caseType" />
          </div>

          <div class="form-group">
            <input
              type="email"
              id="email"
              placeholder="البريد الإلكتروني للتواصل"
              required
            />
          </div>

          <div class="form-group">
            <input
              type="tel"
              id="phone"
              placeholder="رقم الهاتف للتواصل"
              required
            />
          </div>

          <div class="form-group">
            <input
              type="text"
              id="address"
              placeholder="عنوان الإقامة أو مكان التواجد"
              required
            />
          </div>

          <div class="form-group image-upload">
            <label for="caseImage">صورة توضيحية للحالة (اختياري)</label>
            <input type="file" id="caseImage" accept="image/*" />
            <div class="image-preview" id="imagePreviewBox">
              <img id="imagePreview" alt="معاينة الصورة" />
              <span class="placeholder">اختر صورة لعرضها هنا</span>
            </div>
          </div>

          <button type="submit" class="submit-btn">نشر الحالة للمساعدة</button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../Js/config.js"></script>
    <script src="../Js/اضافة حاله جديده.js"></script>
  </body>
</html>
